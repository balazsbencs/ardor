<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="660" viewBox="0 0 1000 660" role="img" aria-labelledby="title desc">
  <title id="title">Raspberry Pi pedal control GPIO wiring</title>
  <desc id="desc">GPIO5, GPIO6, GPIO13, and GPIO16 connect to four footswitches. GPIO17 and GPIO22 connect to encoder A and B. Switch and encoder commons connect to ground.</desc>
  <defs>
    <style>
      .bg { fill: #f7f7f2; }
      .panel { fill: #ffffff; stroke: #2d2d2d; stroke-width: 2; }
      .pin { fill: #f1f1eb; stroke: #555; stroke-width: 1.2; }
      .pin-text { font: 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #2a2a2a; }
      .title { font: 700 26px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1d1d1b; }
      .subtitle { font: 14px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #555; }
      .label { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f1f1d; }
      .small { font: 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4a4a46; }
      .fs { fill: #3f8f72; stroke: #1f5d49; }
      .enc { fill: #cc7a2b; stroke: #8f4e15; }
      .gnd { fill: #4f5d75; stroke: #263247; }
      .reserved { fill: #dadad2; stroke: #aaa; }
      .power { fill: #c94f4f; stroke: #8a2d2d; }
      .callout { fill: #ffffff; stroke-width: 2; rx: 8; }
      .callout-fs { stroke: #3f8f72; }
      .callout-enc { stroke: #cc7a2b; }
      .callout-gnd { stroke: #4f5d75; }
      .wire-fs { stroke: #3f8f72; stroke-width: 3; fill: none; }
      .wire-enc { stroke: #cc7a2b; stroke-width: 3; fill: none; }
      .wire-gnd { stroke: #4f5d75; stroke-width: 3; fill: none; }
      .legend-dot { stroke-width: 1.5; }
    </style>
    <marker id="arrow-fs" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3f8f72"/>
    </marker>
    <marker id="arrow-enc" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#cc7a2b"/>
    </marker>
    <marker id="arrow-gnd" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4f5d75"/>
    </marker>
  </defs>

  <rect class="bg" width="1000" height="660"/>
  <text x="50" y="46" class="title">Pedal Controls GPIO Wiring</text>
  <text x="50" y="70" class="subtitle">View looking down at the Raspberry Pi 4B 40-pin header, USB/Ethernet ports to the right.</text>

  <rect x="330" y="95" width="340" height="500" rx="14" class="panel"/>
  <text x="500" y="128" text-anchor="middle" class="label">Raspberry Pi 40-pin header</text>

  <g id="header">
    <g class="row" transform="translate(0,155)">
      <text x="430" y="5" text-anchor="end" class="pin-text">1  3V3</text>
      <circle cx="455" cy="0" r="9" class="power"/>
      <circle cx="545" cy="0" r="9" class="power"/>
      <text x="570" y="5" class="pin-text">5V  2</text>
    </g>
    <g class="row" transform="translate(0,176)">
      <text x="430" y="5" text-anchor="end" class="pin-text">3  GPIO2</text>
      <circle cx="455" cy="0" r="9" class="reserved"/>
      <circle cx="545" cy="0" r="9" class="power"/>
      <text x="570" y="5" class="pin-text">5V  4</text>
    </g>
    <g class="row" transform="translate(0,197)">
      <text x="430" y="5" text-anchor="end" class="pin-text">5  GPIO3</text>
      <circle cx="455" cy="0" r="9" class="reserved"/>
      <circle cx="545" cy="0" r="9" class="gnd"/>
      <text x="570" y="5" class="pin-text">GND  6</text>
    </g>
    <g class="row" transform="translate(0,218)">
      <text x="430" y="5" text-anchor="end" class="pin-text">7  GPIO4</text>
      <circle cx="455" cy="0" r="9" class="pin"/>
      <circle cx="545" cy="0" r="9" class="pin"/>
      <text x="570" y="5" class="pin-text">GPIO14  8</text>
    </g>
    <g class="row" transform="translate(0,239)">
      <text x="430" y="5" text-anchor="end" class="pin-text">9  GND</text>
      <circle cx="455" cy="0" r="9" class="gnd"/>
      <circle cx="545" cy="0" r="9" class="pin"/>
      <text x="570" y="5" class="pin-text">GPIO15 10</text>
    </g>
    <g class="row" transform="translate(0,260)">
      <text x="430" y="5" text-anchor="end" class="pin-text">11 GPIO17</text>
      <circle cx="455" cy="0" r="9" class="enc"/>
      <circle cx="545" cy="0" r="9" class="reserved"/>
      <text x="570" y="5" class="pin-text">GPIO18 12</text>
    </g>
    <g class="row" transform="translate(0,281)">
      <text x="430" y="5" text-anchor="end" class="pin-text">13 GPIO27</text>
      <circle cx="455" cy="0" r="9" class="reserved"/>
      <circle cx="545" cy="0" r="9" class="gnd"/>
      <text x="570" y="5" class="pin-text">GND 14</text>
    </g>
    <g class="row" transform="translate(0,302)">
      <text x="430" y="5" text-anchor="end" class="pin-text">15 GPIO22</text>
      <circle cx="455" cy="0" r="9" class="enc"/>
      <circle cx="545" cy="0" r="9" class="reserved"/>
      <text x="570" y="5" class="pin-text">GPIO23 16</text>
    </g>
    <g class="row" transform="translate(0,323)">
      <text x="430" y="5" text-anchor="end" class="pin-text">17 3V3</text>
      <circle cx="455" cy="0" r="9" class="power"/>
      <circle cx="545" cy="0" r="9" class="reserved"/>
      <text x="570" y="5" class="pin-text">GPIO24 18</text>
    </g>
    <g class="row" transform="translate(0,344)">
      <text x="430" y="5" text-anchor="end" class="pin-text">19 GPIO10</text>
      <circle cx="455" cy="0" r="9" class="pin"/>
      <circle cx="545" cy="0" r="9" class="gnd"/>
      <text x="570" y="5" class="pin-text">GND 20</text>
    </g>
    <g class="row" transform="translate(0,365)">
      <text x="430" y="5" text-anchor="end" class="pin-text">21 GPIO9</text>
      <circle cx="455" cy="0" r="9" class="pin"/>
      <circle cx="545" cy="0" r="9" class="pin"/>
      <text x="570" y="5" class="pin-text">GPIO25 22</text>
    </g>
    <g class="row" transform="translate(0,386)">
      <text x="430" y="5" text-anchor="end" class="pin-text">23 GPIO11</text>
      <circle cx="455" cy="0" r="9" class="pin"/>
      <circle cx="545" cy="0" r="9" class="pin"/>
      <text x="570" y="5" class="pin-text">GPIO8 24</text>
    </g>
    <g class="row" transform="translate(0,407)">
      <text x="430" y="5" text-anchor="end" class="pin-text">25 GND</text>
      <circle cx="455" cy="0" r="9" class="gnd"/>
      <circle cx="545" cy="0" r="9" class="pin"/>
      <text x="570" y="5" class="pin-text">GPIO7 26</text>
    </g>
    <g class="row" transform="translate(0,428)">
      <text x="430" y="5" text-anchor="end" class="pin-text">27 GPIO0</text>
      <circle cx="455" cy="0" r="9" class="reserved"/>
      <circle cx="545" cy="0" r="9" class="reserved"/>
      <text x="570" y="5" class="pin-text">GPIO1 28</text>
    </g>
    <g class="row" transform="translate(0,449)">
      <text x="430" y="5" text-anchor="end" class="pin-text">29 GPIO5</text>
      <circle cx="455" cy="0" r="9" class="fs"/>
      <circle cx="545" cy="0" r="9" class="gnd"/>
      <text x="570" y="5" class="pin-text">GND 30</text>
    </g>
    <g class="row" transform="translate(0,470)">
      <text x="430" y="5" text-anchor="end" class="pin-text">31 GPIO6</text>
      <circle cx="455" cy="0" r="9" class="fs"/>
      <circle cx="545" cy="0" r="9" class="pin"/>
      <text x="570" y="5" class="pin-text">GPIO12 32</text>
    </g>
    <g class="row" transform="translate(0,491)">
      <text x="430" y="5" text-anchor="end" class="pin-text">33 GPIO13</text>
      <circle cx="455" cy="0" r="9" class="fs"/>
      <circle cx="545" cy="0" r="9" class="gnd"/>
      <text x="570" y="5" class="pin-text">GND 34</text>
    </g>
    <g class="row" transform="translate(0,512)">
      <text x="430" y="5" text-anchor="end" class="pin-text">35 GPIO19</text>
      <circle cx="455" cy="0" r="9" class="reserved"/>
      <circle cx="545" cy="0" r="9" class="fs"/>
      <text x="570" y="5" class="pin-text">GPIO16 36</text>
    </g>
    <g class="row" transform="translate(0,533)">
      <text x="430" y="5" text-anchor="end" class="pin-text">37 GPIO26</text>
      <circle cx="455" cy="0" r="9" class="pin"/>
      <circle cx="545" cy="0" r="9" class="reserved"/>
      <text x="570" y="5" class="pin-text">GPIO20 38</text>
    </g>
    <g class="row" transform="translate(0,554)">
      <text x="430" y="5" text-anchor="end" class="pin-text">39 GND</text>
      <circle cx="455" cy="0" r="9" class="gnd"/>
      <circle cx="545" cy="0" r="9" class="reserved"/>
      <text x="570" y="5" class="pin-text">GPIO21 40</text>
    </g>
  </g>

  <rect x="50" y="160" width="230" height="72" class="callout callout-enc"/>
  <text x="70" y="188" class="label">Encoder A</text>
  <text x="70" y="212" class="small">GPIO17 / physical pin 11</text>
  <path d="M280 196 C335 196 380 260 446 260" class="wire-enc" marker-end="url(#arrow-enc)"/>

  <rect x="50" y="260" width="230" height="72" class="callout callout-enc"/>
  <text x="70" y="288" class="label">Encoder B</text>
  <text x="70" y="312" class="small">GPIO22 / physical pin 15</text>
  <path d="M280 296 C335 296 380 302 446 302" class="wire-enc" marker-end="url(#arrow-enc)"/>

  <rect x="50" y="385" width="230" height="96" class="callout callout-gnd"/>
  <text x="70" y="414" class="label">Common ground rail</text>
  <text x="70" y="438" class="small">Switch commons and encoder common</text>
  <text x="70" y="460" class="small">Use any convenient GND pin</text>
  <path d="M280 432 C345 430 388 408 446 407" class="wire-gnd" marker-end="url(#arrow-gnd)"/>

  <rect x="720" y="340" width="230" height="64" class="callout callout-fs"/>
  <text x="740" y="366" class="label">Footswitch 1</text>
  <text x="740" y="388" class="small">GPIO5 / physical pin 29</text>
  <path d="M720 372 C650 372 540 449 464 449" class="wire-fs" marker-end="url(#arrow-fs)"/>

  <rect x="720" y="415" width="230" height="64" class="callout callout-fs"/>
  <text x="740" y="441" class="label">Footswitch 2</text>
  <text x="740" y="463" class="small">GPIO6 / physical pin 31</text>
  <path d="M720 447 C650 447 540 470 464 470" class="wire-fs" marker-end="url(#arrow-fs)"/>

  <rect x="720" y="490" width="230" height="64" class="callout callout-fs"/>
  <text x="740" y="516" class="label">Footswitch 3</text>
  <text x="740" y="538" class="small">GPIO13 / physical pin 33</text>
  <path d="M720 522 C650 522 540 491 464 491" class="wire-fs" marker-end="url(#arrow-fs)"/>

  <rect x="720" y="565" width="230" height="64" class="callout callout-fs"/>
  <text x="740" y="591" class="label">Footswitch 4</text>
  <text x="740" y="613" class="small">GPIO16 / physical pin 36</text>
  <path d="M720 597 C650 597 620 512 554 512" class="wire-fs" marker-end="url(#arrow-fs)"/>

  <g transform="translate(720 118)">
    <circle cx="0" cy="0" r="7" class="legend-dot fs"/>
    <text x="18" y="5" class="small">Footswitch input</text>
    <circle cx="0" cy="26" r="7" class="legend-dot enc"/>
    <text x="18" y="31" class="small">Encoder input</text>
    <circle cx="0" cy="52" r="7" class="legend-dot gnd"/>
    <text x="18" y="57" class="small">Ground</text>
    <circle cx="0" cy="78" r="7" class="legend-dot reserved"/>
    <text x="18" y="83" class="small">Reserved by Codec/I2S/HAT</text>
  </g>
</svg>
