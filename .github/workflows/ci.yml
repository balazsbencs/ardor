name: Continuous integration

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high

  manager:
    name: Manager app
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: apps/manager
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/manager/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --audit-level=high

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

  managerd:
    name: Manager daemon
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: services/managerd
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Run Go tests
        run: go test ./...

  cpp:
    name: C++ engine
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Configure headless build
        run: cmake -S . -B build-ci -DARDOR_UI_BACKEND=none -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-ci --parallel 2

      - name: Run tests
        run: ctest --test-dir build-ci --output-on-failure
