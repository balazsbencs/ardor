name: Build Firmware

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git curl wget rsync cpio unzip bc \
            python3 python3-dev file pkg-config \
            libssl-dev libelf-dev \
            dosfstools genimage e2fsprogs mtools device-tree-compiler

      - name: Cache Buildroot downloads
        uses: actions/cache@v4
        with:
          path: ~/buildroot-dl
          key: br-dl-${{ hashFiles('buildroot/external/configs/raspberrypi4_ardor_pedal_defconfig') }}
          restore-keys: br-dl-

      - name: Clone Buildroot 2024.02.11
        run: git clone --depth=1 --branch 2024.02.11 https://git.buildroot.net/buildroot ~/buildroot

      - name: Configure
        working-directory: ~/buildroot
        run: |
          make \
            BR2_EXTERNAL=$GITHUB_WORKSPACE/buildroot/external \
            BR2_DL_DIR=$HOME/buildroot-dl \
            raspberrypi4_ardor_pedal_defconfig

      - name: Build
        working-directory: ~/buildroot
        run: make BR2_DL_DIR=$HOME/buildroot-dl -j$(nproc)

      - name: Compress image
        run: gzip -9 ~/buildroot/output/images/sdcard.img

      - name: Upload artifact (non-release runs)
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: sdcard-img
          path: ~/buildroot/output/images/sdcard.img.gz
          retention-days: 7

      - name: Create release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ~/buildroot/output/images/sdcard.img.gz
          generate_release_notes: true
